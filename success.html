<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Message Sent</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* ===== Container ===== */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{ overflow: hidden; }

        .container{
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #4e73df);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        @keyframes gradientMove{
            0%{ background-position:0% 50%; }
            50%{ background-position:100% 50%; }
            100%{ background-position:0% 50%; }
        }

        .container::before,
        .container::after{
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            filter: blur(120px);
        }

        .container::before{ top:-150px; left:-150px; }
        .container::after{ bottom:-150px; right:-150px; }

        /* ===== Popup ===== */
        .popup{
            width: 90%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            color: white;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%,-50%) scale(0.8);
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s ease;
        }

        .open-popup{
            visibility: visible;
            top: 50%;
            transform: translate(-50%,-50%) scale(1);
            opacity: 1;
        }

        .popup img{
            width: 90px;
            margin-top: -70px;
            border-radius: 50%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .popup h2{
            font-size: calc(24px + 1vw);
            font-weight: 700;
            margin: 20px 0 10px;
            letter-spacing: 1px;
        }

        .popup p{
            font-size: calc(14px + 0.3vw);
            opacity: 0.9;
            line-height: 1.6;
        }

        .popup button{
            margin-top: 30px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg,#4e73df,#6fd649);
            color: white;
            font-size: calc(14px + 0.5vw);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .popup button:hover{
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Responsive adjustments */
        @media screen and (max-width:500px){
            .popup{
                padding: 25px 15px;
                border-radius: 15px;
            }
            .popup img{
                width: 70px;
                margin-top: -50px;
            }
        }

    </style>
</head>
<body>

<div class="container">
    <div class="popup" id="popup">
        <img src="assets/img/tick.png" alt="">
        <h2>Well Done!</h2>
        <p>Your Message has been successfully submitted.<br>We will get back to you very soon.</p>
        <button onclick="window.location.href='index.html'">OK</button>
    </div>
</div>

<script>
    window.onload = function(){
        document.getElementById("popup").classList.add("open-popup");
    }
</script>

</body>
</html>
